server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location = /healthz {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
